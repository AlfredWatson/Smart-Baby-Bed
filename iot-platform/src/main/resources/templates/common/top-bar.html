<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/thymeleaf-extras-springsecurity5">
<head>
    <meta charset="UTF-8">
    <title>顶部导航栏</title>
    <link th:href="@{/webjars/Semantic-UI/2.4.1/semantic.min.css}" rel="stylesheet">
    <script type="text/javascript" th:src="@{/webjars/jquery/2.2.4/jquery.min.js}"></script>
    <script type="text/javascript" th:src="@{/webjars/Semantic-UI/2.4.1/semantic.min.js}"></script>
    <style>
        body {
            padding: 1em;
        }

        .ui.menu {
            margin: 3em 0em;
        }

        .ui.menu:last-child {
            margin-bottom: 110px;
        }
    </style>
</head>
<body>
<div class="ui menu">
    <div class="header item">Brand</div>
    <a class="active item">Link</a>
    <a class="item">Link</a>
    <div class="ui dropdown item">
        Dropdown
        <i class="dropdown icon"></i>
        <div class="menu">
            <div class="item">Action</div>
            <div class="item">Another Action</div>
            <div class="item">Something else here</div>
            <div class="divider"></div>
            <div class="item">Separated Link</div>
            <div class="divider"></div>
            <div class="item">One more separated link</div>
        </div>
    </div>
    <div class="right menu">
        <div class="item">
            <div class="ui action left icon input">
                <i class="search icon"></i>
                <input type="text" placeholder="Search">
                <button class="ui button">Submit</button>
            </div>
        </div>
        <a class="item">Link</a>
    </div>
</div>
<!--菜单栏-->
<div class="ui menu" th:fragment="topBar">
    <div>
        <a class="item" th:href="@{/index}">首页</a>
    </div>
    <!--如果未登录-->
    <div sec:authorize="isAuthenticated()">
        <a class="item" th:href="@{/h2}">
            <i class="sign-in icon"></i>物联网工程与实践
        </a>
    </div>
    <!--登录注销-->
    <div class="right menu">
        <!--如果未登录-->
        <div sec:authorize="!isAuthenticated()">
            <a class="item" th:href="@{/toLogin}">
                <i class="sign-in icon"></i>登录
            </a>
        </div>
        <div sec:authorize="!isAuthenticated()">
            <a class="item" th:href="@{/toRegister}">
                <i class="registered outline icon"></i>注册
            </a>
        </div>
        <!--如果已登录-->
        <div sec:authorize="isAuthenticated()">
            <a class="item">
                <i class="user circle outline icon"></i>用户名:
                <span sec:authentication="principal.username"></span>
            </a>
        </div>
        <div sec:authorize="isAuthenticated()">
            <a class="item">
                <i class="address card icon"></i>权限:
                <span sec:authentication="principal.authorities"></span>
            </a>
        </div>
        <div sec:authorize="isAuthenticated()">
            <a class="item" th:href="@{/logout}">
                <i class="sign-out icon"></i>注销
            </a>
        </div>
    </div>
</div>
</body>
</html>
